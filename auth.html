<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyKIT - Login</title>
  <link rel="stylesheet" href="buykit.css">
  <link rel="stylesheet" href="responsive.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; background: #f5f7fb; padding: 24px; }
    .auth-shell { width: min(900px, 100%); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .auth-panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 28px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .auth-panel h1, .auth-panel h2 { color: var(--primary-dark); margin-bottom: 14px; }
    .auth-panel input { width: 100%; padding: 12px 14px; margin: 8px 0; border: 1px solid #d1d5db; border-radius: 6px; }
    .auth-panel button { width: 100%; margin-top: 12px; }
    .auth-top { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; }
    @media (max-width: 760px) { .auth-shell { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="auth-shell">
    <div class="auth-top">
      <a href="index.html" class="checkout-logo"><span class="logo-text">Buy<span class="logo-highlight">KIT</span></span></a>
      <button id="logout-button" class="button button-outline" type="button">Logout</button>
    </div>
    <section class="auth-panel">
      <h1>Login</h1>
      <p id="current-user"></p>
      <form id="login-form">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" minlength="8" required>
        <button class="button button-primary" type="submit">Login</button>
      </form>
    </section>
    <section class="auth-panel">
      <h2>Create account</h2>
      <form id="register-form">
        <input name="name" type="text" placeholder="Full name" required>
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password, minimum 8 characters" minlength="8" required>
        <button class="button button-primary" type="submit">Register</button>
      </form>
    </section>
  </main>
  <div id="cart-popup" class="cart-popup"></div>
  <script type="module" src="frontend/js/auth.js"></script>
</body>
</html>
